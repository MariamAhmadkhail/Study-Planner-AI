<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Study Planner - Login</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <nav>
      <h1>AI Study Planner</h1>
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/register">Register</a></li>
        <li><a href="/login">Login</a></li>
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/create-task">Create Task</a></li>
        <li><a href="/edit-task">Edit Task</a></li>
        <li><a href="/profile">Profile</a></li>
        <li><a href="/ai-planner">AI Planner</a></li>
        <li><a href="/admin">Admin</a></li>
        <li><a href="/checkpoints">Checkpoints</a></li>
      </ul>
    </nav>
    <div class="container">
      <div class="card">
        <h2>Login</h2>
        <form id="loginForm" action="/login" method="POST">
          <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required />
          </div>
          <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required />
          </div>
          <button type="submit">Login</button>
        </form>
        <p>Don't have an account? <a href="/register">Register here</a>.</p>
      </div>
    </div>
    <!-- Added script to store user ID after login -->
    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const formData = new FormData(e.target);
          const email = formData.get("email");
          const password = formData.get("password");

          try {
            // Fetch user data to find the matching user
            const response = await fetch("/data/users.json");
            const users = await response.json();
            const user = users.find(
              (u) => u.email === email && u.password === password,
            );

            if (user) {
              // Store user ID in localStorage
              localStorage.setItem("userId", user.id);
              localStorage.setItem("userRole", user.role);
              // Submit the form to redirect to dashboard
              e.target.submit();
            } else {
              alert("Invalid email or password.");
            }
          } catch (error) {
            console.error("Error:", error);
            alert("Failed to login. Please try again.");
          }
        });
    </script>
  </body>
</html>
