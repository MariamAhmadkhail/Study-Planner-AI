<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Study Planner - Create Task</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <nav>
      <h1>AI Study Planner</h1>
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/register">Register</a></li>
        <li><a href="/login">Login</a></li>
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/create-task">Create Task</a></li>
        <li><a href="/edit-task">Edit Task</a></li>
        <li><a href="/profile">Profile</a></li>
        <li><a href="/ai-planner">AI Planner</a></li>
        <li><a href="/admin">Admin</a></li>
        <li><a href="/checkpoints">Checkpoints</a></li>
      </ul>
    </nav>
    <div class="container">
      <div class="card">
        <h2>Create New Task</h2>
        <form id="taskForm">
          <div class="form-group">
            <label for="subject">Subject:</label>
            <input type="text" id="subject" name="subject" required />
          </div>
          <div class="form-group">
            <label for="title">Task Title:</label>
            <input type="text" id="title" name="title" required />
          </div>
          <div class="form-group">
            <label for="dueDate">Due Date:</label>
            <input type="date" id="dueDate" name="dueDate" required />
          </div>
          <div class="form-group">
            <label for="difficulty">Difficulty:</label>
            <select id="difficulty" name="difficulty" required>
              <option value="Easy">Easy</option>
              <option value="Medium">Medium</option>
              <option value="Hard">Hard</option>
            </select>
          </div>
          <div class="form-group">
            <label for="estimatedTime">Estimated Time (minutes):</label>
            <input
              type="number"
              id="estimatedTime"
              name="estimatedTime"
              required
            />
          </div>
          <button type="submit">Create Task</button>
        </form>
      </div>
    </div>
    <script src="/js/create-task.js"></script>
  </body>
</html>
