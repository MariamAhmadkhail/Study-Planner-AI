<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Study Planner - Profile</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <nav>
      <h1>AI Study Planner</h1>
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/register">Register</a></li>
        <li><a href="/login">Login</a></li>
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/create-task">Create Task</a></li>
        <li><a href="/edit-task">Edit Task</a></li>
        <li><a href="/profile">Profile</a></li>
        <li><a href="/ai-planner">AI Planner</a></li>
        <li><a href="/admin">Admin</a></li>
        <li><a href="/checkpoints">Checkpoints</a></li>
      </ul>
    </nav>
    <div class="container">
      <div class="card">
        <h2>Your Profile</h2>
        <form id="profileForm">
          <div class="form-group">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required />
          </div>
          <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required />
          </div>
          <div class="form-group">
            <label for="grade">Grade Level:</label>
            <input type="text" id="grade" name="grade" required />
          </div>
          <div class="form-group">
            <label for="favoriteSubject">Favorite Subject:</label>
            <input type="text" id="favoriteSubject" name="favoriteSubject" />
          </div>
          <div class="form-group">
            <label for="weakestSubject">Weakest Subject:</label>
            <input type="text" id="weakestSubject" name="weakestSubject" />
          </div>
          <div class="form-group">
            <label for="studyHours">Study Hours per Day:</label>
            <input type="text" id="studyHours" name="studyHours" />
          </div>
          <div class="form-group">
            <label for="learningStyle">Learning Style:</label>
            <input type="text" id="learningStyle" name="learningStyle" />
          </div>
          <div class="form-group">
            <label for="school">School Name:</label>
            <input type="text" id="school" name="school" />
          </div>
          <div class="form-group">
            <label for="goal">Academic Goal:</label>
            <input type="text" id="goal" name="goal" />
          </div>
          <div class="form-group">
            <label for="preferredStudyTime">Preferred Study Time:</label>
            <input
              type="text"
              id="preferredStudyTime"
              name="preferredStudyTime"
            />
          </div>
          <button type="submit">Save Profile</button>
        </form>
      </div>
    </div>
    <script src="/js/profile.js"></script>
  </body>
</html>
