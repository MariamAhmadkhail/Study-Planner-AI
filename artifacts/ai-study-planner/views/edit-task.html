<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Study Planner - Edit Task</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <nav>
      <h1>AI Study Planner</h1>
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/register">Register</a></li>
        <li><a href="/login">Login</a></li>
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/create-task">Create Task</a></li>
        <li><a href="/edit-task">Edit Task</a></li>
        <li><a href="/profile">Profile</a></li>
        <li><a href="/ai-planner">AI Planner</a></li>
        <li><a href="/admin">Admin</a></li>
        <li><a href="/checkpoints">Checkpoints</a></li>
      </ul>
    </nav>
    <div class="container">
      <div class="card">
        <h2>Edit Tasks</h2>
        <div id="task-list" class="task-list">
          <!-- Tasks will be loaded here -->
        </div>
      </div>
    </div>

    <!-- Inline JavaScript for Task Editing -->
    <script>
      // Wait for the DOM to fully load
      document.addEventListener("DOMContentLoaded", () => {
        // Check if the user is logged in
        const userId = localStorage.getItem("userId");

        if (!userId) {
          alert("You are not logged in. Redirecting to login page.");
          window.location.href = "/login";
          return;
        }

        // Fetch tasks from the server via the /get-tasks endpoint
        async function loadTasks() {
          try {
            const response = await fetch("/get-tasks");
            if (!response.ok) {
              throw new Error(`HTTP error! status: ${response.status}`);
            }
            const tasks = await response.json();
            const userTasks = tasks.filter((task) => task.userId === userId);
            const taskListDiv = document.getElementById("task-list");

            if (!taskListDiv) {
              throw new Error("Task list container not found.");
            }

            if (userTasks.length === 0) {
              taskListDiv.innerHTML =
                "<p>No tasks found. <a href='/create-task'>Create a task</a>.</p>";
              return;
            }

            taskListDiv.innerHTML = userTasks
              .map(
                (task) => `
              <div class="task" data-task-id="${task.id}">
                <h4>${task.title}</h4>
                <p><strong>Subject:</strong> ${task.subject}</p>
                <p><strong>Due Date:</strong> ${task.dueDate}</p>
                <p><strong>Difficulty:</strong> ${task.difficulty}</p>
                <p><strong>Estimated Time:</strong> ${task.estimatedTime} minutes</p>
                <p><strong>Status:</strong> ${task.status}</p>
                <button class="edit-btn" data-task-id="${task.id}">Edit</button>
                <button class="delete-btn" data-task-id="${task.id}">Delete</button>
                <hr />
              </div>
            `,
              )
              .join("");

            // Add event listeners for edit and delete buttons
            document.querySelectorAll(".edit-btn").forEach((btn) => {
              btn.addEventListener("click", (e) => {
                const taskId = e.target.getAttribute("data-task-id");
                editTask(taskId, userTasks);
              });
            });

            document.querySelectorAll(".delete-btn").forEach((btn) => {
              btn.addEventListener("click", (e) => {
                const taskId = e.target.getAttribute("data-task-id");
                deleteTask(taskId);
              });
            });
          } catch (error) {
            console.error("Error loading tasks:", error);
            alert(
              `Failed to load tasks. Error: ${error.message}. Please try again.`,
            );
          }
        }

        // Edit a task
        function editTask(taskId, tasks) {
          const task = tasks.find((t) => t.id === taskId);
          if (!task) {
            alert("Task not found.");
            return;
          }

          const subject = prompt("Subject:", task.subject);
          if (!subject) return;

          const title = prompt("Task Title:", task.title);
          if (!title) return;

          const dueDate = prompt("Due Date (YYYY-MM-DD):", task.dueDate);
          if (!dueDate) return;

          const difficulty = prompt(
            "Difficulty (Easy/Medium/Hard):",
            task.difficulty,
          );
          if (!difficulty) return;

          const estimatedTime = prompt(
            "Estimated Time (minutes):",
            task.estimatedTime,
          );
          if (!estimatedTime) return;

          const status = prompt(
            "Status (Pending/In Progress/Completed):",
            task.status,
          );
          if (!status) return;

          const updatedTask = {
            ...task,
            subject,
            title,
            dueDate,
            difficulty,
            estimatedTime,
            status,
          };

          fetch("/update-task", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(updatedTask),
          })
            .then((response) => {
              if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
              }
              return response.json();
            })
            .then((data) => {
              if (data.success) {
                alert("Task updated successfully!");
                loadTasks(); // Refresh the task list
              } else {
                alert("Failed to update task. Please try again.");
              }
            })
            .catch((error) => {
              console.error("Error updating task:", error);
              alert(
                `Failed to update task. Error: ${error.message}. Please try again.`,
              );
            });
        }

        // Delete a task
        function deleteTask(taskId) {
          if (!confirm("Are you sure you want to delete this task?")) return;

          fetch("/delete-task", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ taskId }),
          })
            .then((response) => {
              if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
              }
              return response.json();
            })
            .then((data) => {
              if (data.success) {
                alert("Task deleted successfully!");
                loadTasks(); // Refresh the task list
              } else {
                alert("Failed to delete task. Please try again.");
              }
            })
            .catch((error) => {
              console.error("Error deleting task:", error);
              alert(
                `Failed to delete task. Error: ${error.message}. Please try again.`,
              );
            });
        }

        // Load tasks when the DOM is ready
        loadTasks();
      });
    </script>
  </body>
</html>
