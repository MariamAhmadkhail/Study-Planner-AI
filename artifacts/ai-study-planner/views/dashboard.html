<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Study Planner - Dashboard</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <nav>
      <h1>AI Study Planner</h1>
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/register">Register</a></li>
        <li><a href="/login">Login</a></li>
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/create-task">Create Task</a></li>
        <li><a href="/edit-task">Edit Task</a></li>
        <li><a href="/profile">Profile</a></li>
        <li><a href="/ai-planner">AI Planner</a></li>
        <li><a href="/admin">Admin</a></li>
        <li><a href="/checkpoints">Checkpoints</a></li>
      </ul>
    </nav>
    <div class="container">
      <div class="card">
        <h2>Dashboard</h2>
        <div class="task-list">
          <h3>Your Tasks</h3>
          <div id="tasks-container">
            <p>
              No tasks yet. <a href="/create-task">Create a task</a> to get
              started!
            </p>
          </div>
        </div>
      </div>
    </div>
    <script>
      // Mock tasks (existing code)
      const mockTasks = [
        {
          title: "Complete Math Homework",
          description: "Finish algebra problems",
          dueDate: "2026-06-01",
          priority: "High",
        },
        {
          title: "Study for Science Test",
          description: "Review chapters 1-3",
          dueDate: "2026-06-05",
          priority: "Medium",
        },
      ];

      const tasksContainer = document.getElementById("tasks-container");
      if (mockTasks.length > 0) {
        tasksContainer.innerHTML = "";
        mockTasks.forEach((task) => {
          const taskElement = document.createElement("div");
          taskElement.className = "task";
          taskElement.innerHTML = `
            <h4>${task.title}</h4>
            <p><strong>Description:</strong> ${task.description}</p>
            <p><strong>Due Date:</strong> ${task.dueDate}</p>
            <p><strong>Priority:</strong> ${task.priority}</p>
            <hr />
          `;
          tasksContainer.appendChild(taskElement);
        });
      }
    </script>
  </body>
</html>
